<!-- The Generated Feature Scripts Component -->
<section id="feature-scripts" class="store section bg-darker">
    <div class="container">
        <!-- Header & Category Buttons -->
        <div class="featured-header-wrapper" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 50px;">
            <div class="featured-header-left">
                <div class="badge-pill" style="display:inline-flex; align-items:center; gap:8px; background:transparent; border: 1px solid rgba(255, 255, 255, 0.1); padding: 6px 16px; border-radius: 40px; font-size: 0.85rem; color: #888; font-weight: 500; margin-bottom: 25px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--primary-neon)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="fill: var(--primary-neon);"><rect x="9" y="9" width="6" height="6" transform="rotate(45 12 12)"/></svg> 
                    Featured Products
                </div>
                <h2 style="font-family: 'Space Mono', monospace; font-size: 3.2rem; color: #fff; line-height: 1.1; letter-spacing: -1px; margin: 0;">Popular tools<br>traders start with.</h2>
            </div>
            <div class="featured-categories" style="display: flex; gap: 15px;">
                <button class="btn-category active-category" onclick="switchCategory('tradingview', this)" style="background: var(--primary-neon); color: #000; border-color: var(--primary-neon); border-radius: 40px; padding: 10px 24px; font-weight: 600; cursor: pointer; border: 1px solid transparent; font-size: 0.95rem;">TradingView</button>
                <button class="btn-category" onclick="switchCategory('metatrader', this)" style="background: transparent; color: #e0e0e0; border-color: rgba(255,255,255,0.1); border-radius: 40px; padding: 10px 24px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 0.95rem;">MetaTrader 4</button>
                <button class="btn-category" onclick="switchCategory('pythonbots', this)" style="background: transparent; color: #e0e0e0; border-color: rgba(255,255,255,0.1); border-radius: 40px; padding: 10px 24px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); font-size: 0.95rem;">Python Bots</button>
            </div>
        </div>

        <div id="feature-grid-container">
            <!-- Rendered via JS -->
        </div>

        <div class="text-center" style="margin-top: 60px;">
            <a href="#featured" class="btn btn-outline-pill btn-large outline-dark" style="border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px 30px; border-radius: 40px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; background: rgba(255,255,255,0.02); transition: background 0.3s; cursor: pointer;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">Browse All Feature Scripts <span class="btn-icon">&rarr;</span></a>
        </div>
    </div>
    
    <script>
        const iconSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v4"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M5 22V12a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v10"/><path d="M9 13v9"/></svg>';
        
        const catProducts = {
            'tradingview': [
                { t: "Smart Money Concepts", p: "$149.00", d: "Automated SMC indicator defining supply, demand, and fair value gaps.", b1: "WIN: 75%", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Trend Confirmation Pro", p: "$99.00", d: "Filter out market noise with dynamic volatility bands.", b1: "TREND FILTER", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "OrderBlock Matrix", p: "$129.00", d: "Maps hidden institutional order blocks across multiple timeframes.", b1: "RR: 1:4", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Liquidity Sweep Toolkit", p: "$199.00", d: "Alerts you perfectly when retail liquidity is taken efficiently.", b1: "SNIPER ENTRIES", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Fibonacci Auto-Trader", p: "$89.00", d: "Automatically plots the optimal fib retracement levels live.", b1: "WIN: 68%", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Volume Delta Profiler", p: "$249.00", d: "Uncover hidden buying and selling pressure with deep volume analytics.", b1: "ADVANCED", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Reversal Divergence", p: "$159.00", d: "Spot hidden RSI and MACD divergences automatically.", b1: "WIN: 82%", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" },
                { t: "Breakout Mastery EA", p: "$179.00", d: "Capture explosive moves out of tight consolidation zones seamlessly.", b1: "HIGH RR", b1c: "green", b2: "TRADINGVIEW", b2c: "cyan" }
            ],
            'metatrader': [
                { t: "Gold Scalper EA", p: "$299.00", d: "Optimized for XAUUSD on the M5 timeframe with trailing stops.", b1: "WIN: 88%", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "Grid Recovery Bot", p: "$349.00", d: "Safe grid strategy designed to recover drawdown efficiently.", b1: "DRAWDOWN < 5%", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "News Hedging EA", p: "$199.00", d: "Automatically places straddle orders 10 seconds before high impact news.", b1: "NEWS TRADER", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "London Breakout Pro", p: "$149.00", d: "Traded specifically during the London open session for maximum volatility.", b1: "SESSION BOT", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "Prop Firm Passer", p: "$499.00", d: "Low risk MT4 expert advisor designed to pass challenge phases.", b1: "PROP FIRM", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "Night Scalper EA", p: "$249.00", d: "Exploits low volatility Asian session ranges with precise boundaries.", b1: "ASIAN SESSION", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "EURUSD Pips Hunter", p: "$129.00", d: "Strictly confined to EURUSD trends using moving average crossovers.", b1: "WIN: 71%", b1c: "green", b2: "METATRADER 4", b2c: "cyan" },
                { t: "Trailing Stop Manager", p: "$69.00", d: "Utility EA that trails your manual positions automatically.", b1: "UTILITY", b1c: "green", b2: "METATRADER 4", b2c: "cyan" }
            ],
            'pythonbots': [
                { t: "Mempool Sniper", p: "$599.00", d: "High-speed token sniper for ETH and BSC networks.", b1: "ON-CHAIN", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Arbitrage Triangle", p: "$799.00", d: "Finds micro discrepancies between 3 trading pairs on centralized exchanges.", b1: "ARBITRAGE", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "DCA Grid Node", p: "$299.00", d: "Fully detached Python server for scaling in and out of crypto spot positions.", b1: "SPOT TRADING", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Funding Rate Harvester", p: "$399.00", d: "Automatically long/short perpetuals to harvest delta-neutral yields.", b1: "DELTA NEUTRAL", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Sentiment Analysis Bot", p: "$449.00", d: "Scrapes Twitter and Reddit to front-run hype driven coin pumps.", b1: "AI DRIVEN", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Stat-Arb Co-integration", p: "$899.00", d: "Trades the spread between two highly correlated crypto assets crossing.", b1: "QUANTITATIVE", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Market Maker Liquidity", p: "$1000.00+", d: "Provide continuous liquidity around the spread to capture fees.", b1: "INSTITUTIONAL", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" },
                { t: "Flash Loan Executor", p: "$649.00", d: "Identify and execute uncollateralized arbitrage in a single block.", b1: "DEFI", b1c: "green", b2: "PYTHON BOT", b2c: "cyan" }
            ]
        };

        function renderCategory(cat) {
            const products = catProducts[cat];
            let html = '<div class="grid-4-cols category-grid" style="gap: 24px; row-gap: 30px;">';
            products.forEach(p => {
                html += '<div class="prop-card">';
                html += '  <div class="prop-card-top">';
                html += '    <div class="prop-icon">' + iconSvg + '</div>';
                html += '    <div class="prop-price">' + p.p + '</div>';
                html += '  </div>';
                html += '  <div class="prop-card-middle">';
                html += '    <h3 class="prop-title">' + p.t + '</h3>';
                html += '    <p class="prop-desc">' + p.d + '</p>';
                html += '    <div class="prop-badges">';
                html += '        <span class="prop-badge ' + p.b1c + '" style="padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">' + p.b1 + '</span>';
                html += '        <span class="prop-badge ' + p.b2c + '" style="padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold;">' + p.b2 + '</span>';
                html += '    </div>';
                html += '  </div>';
                html += '  <div class="prop-card-bottom">';
                html += '    <button class="prop-heart-btn" aria-label="Add to wishlist"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>';
                html += '    <button class="prop-cart-btn" aria-label="Add to cart"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> Add to cart</button>';
                html += '  </div>';
                html += '</div>';
            });
            html += '</div>';
            document.getElementById('feature-grid-container').innerHTML = html;
        }

        function switchCategory(cat, btn) {
            const buttons = btn.parentElement.querySelectorAll('.btn-category');
            buttons.forEach(b => {
                b.style.background = 'transparent';
                b.style.color = '#e0e0e0';
                b.style.borderColor = 'rgba(255,255,255,0.2)';
            });
            btn.style.background = 'var(--primary-neon)';
            btn.style.color = '#000';
            btn.style.borderColor = 'var(--primary-neon)';
            renderCategory(cat);
        }

        // Initialize first section
        document.addEventListener("DOMContentLoaded", () => {
            renderCategory('tradingview');
        });
    </script>
</section>
